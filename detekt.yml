# detekt configuration for keel
# Builds upon the default config (buildUponDefaultConfig = true)
# Only overrides/disables rules that don't fit the project.

complexity:
  # KMP actual classes need to mirror expect — structure is dictated by API
  TooManyFunctions:
    active: false
  NestedBlockDepth:
    threshold: 5  # readLine/readChunkedBody have unavoidable nesting
  LongMethod:
    threshold: 80  # EventLoop.loop() and flush methods are inherently long
  LongParameterList:
    functionThreshold: 8  # cinterop wrappers often have many params
    constructorThreshold: 10
  CyclomaticComplexMethod:
    threshold: 20  # EventLoop dispatch logic has unavoidable branching

style:
  # Wildcard imports are acceptable for platform.posix.* and cinterop
  WildcardImport:
    active: false
  # MagicNumber: project uses constants-config.md rule instead
  MagicNumber:
    active: false
  # ReturnCount: not in Kotlin coding conventions. Early returns for error
  # handling are idiomatic and improve readability.
  ReturnCount:
    active: false
  # UnusedParameter: actual fun implementations may not use all params
  UnusedParameter:
    active: false
  # MaxLineLength: KDoc lines and cinterop signatures can be long
  MaxLineLength:
    maxLineLength: 140
  # LoopWithTooManyJumpStatements: EventLoop.loop() and parser loops
  # use break/continue for control flow (EINTR retry, wakeup consume, etc.)
  LoopWithTooManyJumpStatements:
    active: false
  # UseCheckOrError/UseRequire: readByte/readByteArray throw
  # IllegalStateException for EOF, which is semantically correct
  # (not a precondition check but a state violation)
  UseCheckOrError:
    active: false
  UseRequire:
    active: false

empty-blocks:
  # awaitClosed() and close() are intentionally empty (not yet implemented
  # or no-op by design). SuspendChannelSource/Sink close() delegates
  # ownership to the caller.
  EmptyFunctionBlock:
    active: false
  EmptyElseBlock:
    active: false

naming:
  # Allow short names in cinterop contexts (fd, ev, rc, n, etc.)
  FunctionParameterNaming:
    parameterPattern: '[a-z][A-Za-z0-9]*'
  VariableNaming:
    variablePattern: '[a-z][A-Za-z0-9]*'

exceptions:
  # TooGenericExceptionCaught: EventLoop catches Exception for resilience
  TooGenericExceptionCaught:
    active: false
  # InstanceOfCheckForException: CancellationException check is idiomatic
  # in Kotlin coroutine error handling
  InstanceOfCheckForException:
    active: false

potential-bugs:
  # CastToNullableType: cinterop often requires nullable casts
  CastToNullableType:
    active: false

# detekt-formatting (ktlint wrapper)
# See .claude/rules/kotlin-formatting.md for full policy.
formatting:
  # Intentional alignment (e.g., HttpStatus val declarations) uses multiple spaces.
  NoMultipleSpaces:
    active: false
  # Kotlin coding conventions compliance — see .claude/rules/kotlin-formatting.md
  TrailingCommaOnCallSite:
    active: true
    useTrailingCommaOnCallSite: true
  TrailingCommaOnDeclarationSite:
    active: true
    useTrailingCommaOnDeclarationSite: true
  NoWildcardImports:
    active: true
    # Ktor SDK uses wildcard imports idiomatically (io.ktor.* etc.)
    packagesToUseImportOnDemandProperty: "io.ktor.**"
  NoUnusedImports:
    active: true
  FinalNewline:
    active: true
  NoLineBreakBeforeAssignment:
    active: true
  MaximumLineLength:
    active: true
    maxLineLength: 140
  Indentation:
    active: true
    indentSize: 4
  NoSemicolons:
    active: true
  NoTrailingSpaces:
    active: true

# keel custom rules (detekt-rules module)
keel:
  IoBufLeak:
    active: true
  ArenaLeak:
    active: true
  StableRefLeak:
    active: true

