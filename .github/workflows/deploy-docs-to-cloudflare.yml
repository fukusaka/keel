name: Deploy Docs to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
  release:
    types: [published]
  pull_request:
    types: [labeled]
  workflow_dispatch:

# Comma-separated list of users allowed to trigger deploy via deploy-docs label.
# Reuses the same CI_ALLOWED_USERS variable as ci.yml.

concurrency:
  group: deploy-docs-cloudflare
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'release' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       github.event.label.name == 'deploy-docs' &&
       contains(format(',{0},', vars.CI_ALLOWED_USERS), format(',{0},', github.event.sender.login)))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # --- Docusaurus ---

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: website

      - name: Build Docusaurus
        run: npm run build
        working-directory: website
        env:
          SITE_URL: https://keel-kt.pages.dev
          BASE_URL: /

      # --- Dokka (release and manual only) ---

      - uses: actions/setup-java@v5
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v5
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'

      - name: Cache Kotlin/Native toolchain
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-

      - name: Generate API docs (Dokka)
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        run: ./gradlew dokkaGeneratePublicationHtml

      - name: Copy Dokka output to website build
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        run: cp -r build/dokka/html website/build/api

      # --- Deploy ---

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy website/build --project-name=keel-kt
