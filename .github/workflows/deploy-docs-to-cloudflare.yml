name: Deploy Docs to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
  pull_request:
    types: [labeled]
  workflow_dispatch:

# Comma-separated list of users allowed to trigger deploy via deploy-docs label.
# Reuses the same CI_ALLOWED_USERS variable as ci.yml.

concurrency:
  group: deploy-docs-cloudflare
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       github.event.label.name == 'deploy-docs' &&
       contains(format(',{0},', vars.CI_ALLOWED_USERS), format(',{0},', github.event.sender.login)))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: website

      - name: Build
        run: npm run build
        working-directory: website
        env:
          SITE_URL: https://keel-kt.pages.dev
          BASE_URL: /

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy website/build --project-name=keel-kt
