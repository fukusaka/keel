name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    types: [ labeled, synchronize ]

# Comma-separated list of users allowed to trigger CI via needs-pr-check label.
# Set in: Settings > Secrets and variables > Actions > Variables > CI_ALLOWED_USERS
# If not set, label-triggered CI is disabled for all users.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    name: Build & Test (JVM + linuxX64)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'needs-pr-check') &&
       contains(format(',{0},', vars.CI_ALLOWED_USERS), format(',{0},', github.event.sender.login)))

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v5

      - name: Install native dependencies
        run: sudo apt-get install -y liburing-dev

      - name: Cache Kotlin/Native toolchain
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-

      - name: Static analysis (detekt)
        run: ./gradlew detektMetadataCommonMain detektLinuxX64Main detektJvmMain

      - name: Compile (JVM + linuxX64)
        run: ./gradlew compileKotlinJvm compileKotlinLinuxX64

      - name: Test (JVM)
        run: ./gradlew jvmTest

      - name: Test (linuxX64)
        run: ./gradlew linuxX64Test
